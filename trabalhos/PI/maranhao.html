<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maranhao</title>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>

  <link rel="stylesheet" href="maranhao.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<header class="header">
  <img src="icon/icon.ico" alt="Descrição do Ícone" width="90" height="80">


  <nav>
    <ul class="menu">
      <li><a href="#home">Home</a></li>
      <li><a href="#login">Login</a></li>
      <li><a href="#sobre">Sobre</a></li>
    </ul>
  </nav>
</header>

<body>





  <div class="container py-4">
    <div class="row g-4">

      <!-- carrosel para as img dos lecois maranheses  -->
      <div class="col-md-6 col-lg-3">
        <div class="car-card">

          <div id="lecoisMaranheses" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner">

              <div class="carousel-item active">
                <img src="img/lencoisMaranhao/lencois01.avif">
              </div>

              <div class="carousel-item">
                <img src="img/lencoisMaranhao/lencois02.avif">
              </div>

              <div class="carousel-item">
                <img src="img/lencoisMaranhao/lencois03.avif">
              </div>

            </div>

            <!-- SETAS -->
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselLaFerrari"
              data-bs-slide="prev">
              <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselLaFerrari"
              data-bs-slide="next">
              <span class="carousel-control-next-icon"></span>
            </button>

          </div>

          <div class="car-title">Lecois Maranheses</div>
        </div>
      </div>


      <!-- Comidas -->
      <div class="col-md-6 col-lg-3">
        <div class="car-card">

          <div id="comidas" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner">

              <div class="carousel-item active">
                <img src="img/ComidaMaranhao/arroxDeCuxa.webp">
              </div>

              <div class="carousel-item">
                <img src="img/ComidaMaranhao/camaraoGigante.jpg">
              </div>

              <div class="carousel-item">
                <img src="img/ComidaMaranhao/camraoNaMoranga.webp">
              </div>

            </div>

            <!-- SETAS -->
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselPuroSangue"
              data-bs-slide="prev">
              <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselPuroSangue"
              data-bs-slide="next">
              <span class="carousel-control-next-icon"></span>
            </button>

          </div>

          <div class="car-title">Comidas tipicas </div>
        </div>
      </div>

    </div>

    



    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script src="maranhao.js"></script>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carros</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<header class="header">
  <h2 class="logo">Ferrari</h2>

  <nav>
    <ul class="menu">
      <li><a href="#home">Home</a></li>
      <li><a href="#login">Login</a></li>
      <li><a href="#sobre">Sobre</a></li>
    </ul>
  </nav>
</header>

<body>





<div class="container py-4">
  <div class="row g-4">

    <!-- LA FERRARI -->
    <div class="col-md-6 col-lg-3">
      <div class="car-card">

        <div id="carouselLaFerrari" class="carousel slide" data-bs-ride="carousel">

          <div class="carousel-inner">

            <div class="carousel-item active">
              <img src="img/laFerrari/laFerrari01.jpg">
            </div>

            <div class="carousel-item">
              <img src="img/laFerrari/laFerrari02.jpg">
            </div>

            <div class="carousel-item">
              <img src="img/laFerrari/laFerrari03.jpg">
            </div>

          </div>

          <!-- SETAS -->
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselLaFerrari" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button class="carousel-control-next" type="button" data-bs-target="#carouselLaFerrari" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>

        </div>

        <div class="car-title">La Ferrari</div>
      </div>
    </div>

    <!-- F80 -->
    <div class="col-md-6 col-lg-3">
      <div class="car-card">

        <div id="carouselF80" class="carousel slide" data-bs-ride="carousel">

          <div class="carousel-inner">

            <div class="carousel-item active">
              <img src="img/f80/f8001.jpeg">
            </div>

            <div class="carousel-item">
              <img src="img/f80/f8002.jpg">
            </div>

            <div class="carousel-item">
              <img src="img/f80/f8003.jpg">
            </div>

          </div>

          <!-- SETAS -->
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselF80" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button class="carousel-control-next" type="button" data-bs-target="#carouselF80" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>

        </div>

        <div class="car-title">F80</div>
      </div>
    </div>

    <!-- PUROSANGUE -->
    <div class="col-md-6 col-lg-3">
      <div class="car-card">

        <div id="carouselPuroSangue" class="carousel slide" data-bs-ride="carousel">

          <div class="carousel-inner">

            <div class="carousel-item active">
              <img src="img/puroSange/puroSangue01.jpeg">
            </div>

            <div class="carousel-item">
              <img src="img/puroSange/puroSangue02.webp">
            </div>

            <div class="carousel-item">
              <img src="img/puroSange/puroSangue03.jpg">
            </div>

          </div>

          <!-- SETAS -->
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselPuroSangue" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button class="carousel-control-next" type="button" data-bs-target="#carouselPuroSangue" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>

        </div>

        <div class="car-title">Purosangue</div>
      </div>
    </div>

    <!-- SPIDER -->
    <div class="col-md-6 col-lg-3">
      <div class="car-card">

        <div id="carouselSpider" class="carousel slide" data-bs-ride="carousel">

          <div class="carousel-inner">

            <div class="carousel-item active">
              <img src="img/Spider/spider01.jpg">
            </div>

            <div class="carousel-item">
              <img src="img/Spider/spider02.jpg">
            </div>

            <div class="carousel-item">
              <img src="img/Spider/spider03.jpg">
            </div>

          </div>

          <!-- SETAS -->
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselSpider" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>

          <button class="carousel-control-next" type="button" data-bs-target="#carouselSpider" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>

        </div>

        <div class="car-title">Spider</div>
      </div>
    </div>

  </div>
</div>

  
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script></body>


</html>
